{% extends "base.html" %}

{% block title %}新增修复记录 - 博物馆藏品管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h2>新增修复记录</h2>
    <a href="/restorations" class="btn btn-outline">返回列表</a>
</div>

<div class="form-container">
    <form method="POST" action="/restorations/create">
        <div class="form-group">
            <label for="artifact_id">关联文物</label>
            <select id="artifact_id" name="artifact_id" required>
                {% for a in artifacts %}
                <option value="{{ a.id }}">{{ a.name }} ({{ a.category }}·{{ a.era }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="restorer">修复人</label>
            <input type="text" id="restorer" name="restorer" required>
        </div>
        <div class="form-group">
            <label for="method">修复方法</label>
            <input type="text" id="method" name="method" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="start_date">开始日期</label>
                <input type="date" id="start_date" name="start_date" required>
            </div>
            <div class="form-group">
                <label for="end_date">结束日期</label>
                <input type="date" id="end_date" name="end_date">
            </div>
        </div>
        <div class="form-group">
            <label for="cost">费用(元)</label>
            <input type="text" id="cost" name="cost" placeholder="0.00">
        </div>
        <div class="form-group">
            <label for="status">状态</label>
            <select id="status" name="status">
                <option value="进行中">进行中</option>
                <option value="已完成">已完成</option>
                <option value="暂停">暂停</option>
            </select>
        </div>
        <div class="form-group">
            <label for="description">修复描述</label>
            <textarea id="description" name="description" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">提交</button>
    </form>
</div>
{% endblock %}
